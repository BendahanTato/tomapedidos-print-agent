<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TomaPedidos Print Agent</title>
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<main id="app">
  <div id="login-screen" class="login-screen">
    <form id="login-form" class="login-form">
      <h1>Print Agent</h1>
      <p class="login-sub">Panel local</p>
      <input type="password" id="pin-input" placeholder="PIN" maxlength="8" autofocus required>
      <button type="submit">Ingresar</button>
      <p id="login-error" class="login-error hidden"></p>
    </form>
  </div>

  <div id="main-screen" class="main-screen hidden">
    <aside class="sidebar">
      <div class="sidebar-brand">
        <h2 class="sidebar-title">TomaPedidos</h2>
        <p class="sidebar-sub">Print Agent</p>
      </div>
      <nav class="sidebar-nav">
        <button data-route="dashboard" class="nav-btn active">Dashboard</button>
        <button data-route="printers" class="nav-btn">Impresoras</button>
        <button data-route="jobs" class="nav-btn">Jobs</button>
        <button data-route="settings" class="nav-btn">Settings</button>
      </nav>
      <div class="sidebar-footer">
        <span id="agent-version" class="sidebar-version">v?</span>
        <button id="logout-btn" class="logout-btn">Salir</button>
      </div>
    </aside>

    <section class="content">
      <div id="view-dashboard" class="view"></div>
      <div id="view-printers" class="view hidden"></div>
      <div id="view-jobs" class="view hidden"></div>
      <div id="view-settings" class="view hidden"></div>
    </section>
  </div>
</main>

<div id="toast-container" class="toast-container"></div>

<script src="/js/app.js"></script>
</body>
</html>
