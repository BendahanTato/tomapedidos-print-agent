name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { goos: darwin,  goarch: amd64 }
          - { goos: darwin,  goarch: arm64 }
          - { goos: linux,   goarch: amd64 }
          - { goos: linux,   goarch: arm64 }
          - { goos: windows, goarch: amd64 }
          - { goos: windows, goarch: arm64 }
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: "go.mod"
      - name: build
        run: |
          VERSION="${GITHUB_REF#refs/tags/}"
          SHORT_SHA="${GITHUB_SHA:0:8}"
          BUILDTIME="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
          LDFLAGS="-s -w -X github.com/tomapedidos/print-agent/internal/version.Version=${VERSION} -X github.com/tomapedidos/print-agent/internal/version.Commit=${SHORT_SHA} -X github.com/tomapedidos/print-agent/internal/version.BuildTime=${BUILDTIME}"
          OS="${{ matrix.target.goos }}"
          ARCH="${{ matrix.target.goarch }}"
          EXT=""
          [ "${OS}" = "windows" ] && EXT=".exe"
          NAME="print-agent-${OS}-${ARCH}${EXT}"
          CGO_ENABLED=0 GOOS="${OS}" GOARCH="${ARCH}" \
            go build -trimpath -ldflags "${LDFLAGS}" -o "${NAME}" ./cmd/print-agent
          echo "NAME=${NAME}" >> "$GITHUB_ENV"
      - uses: actions/upload-artifact@v4
        with:
          name: "print-agent-${{ matrix.target.goos }}-${{ matrix.target.goarch }}"
          path: "print-agent-${{ matrix.target.goos }}-${{ matrix.target.goarch }}*"

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: "print-agent-*"
          path: dist/
          merge-multiple: true
      - name: checksums
        run: |
          cd dist
          sha256sum * > SHA256SUMS
          cat SHA256SUMS
      - name: create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/print-agent-*
            dist/SHA256SUMS
          generate_release_notes: true
